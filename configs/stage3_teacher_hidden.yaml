data:
  teacher_dump_root: data/teacher_dump
  train_split: data/splits/train.json
  val_split: data/splits/val.json
  test_split: data/splits/test.json
  conditioning_source: teacher_dump
  hidden_cache_dir: null
model:
  teacher_hidden_dim: null
  hidden_dim: 768
  ffn_dim: 3072
  num_layers: 8
  num_heads: 12
  dropout: 0.1
loss:
  gamma: 0.5
optimizer:
  lr: 0.0003
  weight_decay: 0.01
  warmup_fraction: 0.05
training:
  epochs: 30
  batch_size_clips: 1
  bf16: true
  require_cuda: true
  seed: 42
outputs:
  root: outputs/stage3_teacher_hidden
  checkpoint_path: outputs/stage3_teacher_hidden/action_expert.pt
  norm_stats_path: outputs/stage3_teacher_hidden/traj_norm_stats.json
  val_predictions_path: outputs/stage3_teacher_hidden/val_predictions.npz
