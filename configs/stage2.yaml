data:
  teacher_dump_root: data/teacher_dump
  train_split: data/splits/train.json
  val_split: data/splits/val.json
  test_split: data/splits/test.json
  image_prompt: "Describe the driving scene and choose the next trajectory."
  max_frames: 128
  include_kv_cache: false
model:
  backbone_name: Qwen/Qwen2.5-VL-3B-Instruct
  processor_name: Qwen/Qwen2.5-VL-3B-Instruct
  lora_rank: 64
  lora_alpha: 128
  lora_dropout: 0.05
  teacher_hidden_dim: null
  student_hidden_dim: null
loss:
  alpha: 1.0
  beta: 0.1
  temperature: 2.0
optimizer:
  lora_lr: 0.0002
  adapter_lr: 0.0001
  weight_decay: 0.01
training:
  epochs: 3
  gradient_accumulation_steps: 16
  bf16: true
  gradient_checkpointing: true
  require_cuda: true
  seed: 42
outputs:
  root: outputs/stage2
  student_vlm_dir: outputs/stage2/student_vlm
  hidden_cache_dir: outputs/stage2/student_hidden_cache
