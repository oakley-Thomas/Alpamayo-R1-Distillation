services:
  teacher-export:
    image: ${IMAGE_NAME:-alpamayo-distill:stage2}
    command: ["scripts/portainer/export_teacher_dump_all.sh"]
    restart: "no"
    gpus: all
    ipc: host
    shm_size: ${SHM_SIZE:-32gb}
    ulimits:
      memlock: -1
      stack: 67108864
    environment:
      HF_HOME: /cache/huggingface
      HF_TOKEN: ${HF_TOKEN:?Set HF_TOKEN in the Portainer stack environment}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      REPO_URL: ${REPO_URL:-https://github.com/oakley-Thomas/CSE676-Project.git}
      REPO_REF: ${REPO_REF:-VLM-Backbone}
      ALPAMAYO_SUBMODULE_PATH: ${ALPAMAYO_SUBMODULE_PATH:-alpamayo1.5}
      PYTHONPATH: /workspace/repo:/workspace/repo/alpamayo1.5/src
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      TEACHER_DUMP_ROOT: ${TEACHER_DUMP_ROOT:-data/teacher_dump}
      SPLITS_PATH: ${SPLITS_PATH:-data/splits}
      SPLITS: ${SPLITS:-}
      MODEL_NAME: ${MODEL_NAME:-nvidia/Alpamayo-1.5-10B}
      NUM_TRAJ_SAMPLES: ${NUM_TRAJ_SAMPLES:-16}
      TOP_K: ${TOP_K:-32}
      MAX_GENERATION_LENGTH: ${MAX_GENERATION_LENGTH:-256}
      TEMPERATURE: ${TEMPERATURE:-0.6}
      TOP_P: ${TOP_P:-0.98}
      T0_US: ${T0_US:-5100000}
      INCLUDE_KV_CACHE: ${INCLUDE_KV_CACHE:-true}
      CAPTURE_DENOISING: ${CAPTURE_DENOISING:-true}
      STAGE2_ONLY: ${STAGE2_ONLY:-false}
      OVERWRITE: ${OVERWRITE:-false}
      VALIDATE_AFTER_EXPORT: ${VALIDATE_AFTER_EXPORT:-true}
    volumes:
      - alpamayo_hf_cache:/cache/huggingface
      - alpamayo_data:/workspace/data
      - alpamayo_outputs:/workspace/outputs

volumes:
  alpamayo_hf_cache:
    external: true
    name: ${HF_CACHE_VOLUME:-alpamayo_hf_cache}
  alpamayo_data:
    external: true
    name: ${DATA_VOLUME:-alpamayo_data}
  alpamayo_outputs:
    external: true
    name: ${OUTPUTS_VOLUME:-alpamayo_outputs}
